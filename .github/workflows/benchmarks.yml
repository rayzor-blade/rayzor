name: Benchmarks

on:
  push:
    branches: [main, explore/tinycc-tiered-aot, perf/fastcall-x64-fib-ci]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  LLVM_SYS_180_PREFIX: /usr/lib/llvm-18

permissions:
  contents: read
  actions: read

concurrency:
  group: "benchmarks"
  cancel-in-progress: false

jobs:
  build:
    name: Build & Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Install LLVM 18 for Rayzor ---
      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build rayzor-runtime static library
        run: cargo build --release -p rayzor-runtime

      - name: Build rayzor CLI
        run: cargo build --release --features llvm-backend

      - name: Generate precompiled bundles
        run: |
          ./target/release/rayzor bundle compiler/benchmarks/src/deltablue.hx -o compiler/benchmarks/precompiled/deltablue.rzb --strip
          ./target/release/rayzor bundle compiler/benchmarks/src/fibonacci.hx -o compiler/benchmarks/precompiled/fibonacci.rzb --strip
          ./target/release/rayzor bundle compiler/benchmarks/src/mandelbrot.hx -o compiler/benchmarks/precompiled/mandelbrot.rzb --strip
          ./target/release/rayzor bundle compiler/benchmarks/src/nbody.hx -o compiler/benchmarks/precompiled/nbody.rzb --strip

      - name: Upload precompiled bundles
        uses: actions/upload-artifact@v4
        with:
          name: precompiled-bundles
          path: compiler/benchmarks/precompiled/*.rzb
          retention-days: 1

      - name: Upload rayzor binaries
        uses: actions/upload-artifact@v4
        with:
          name: rayzor-binaries
          path: |
            target/release/rayzor
            target/release/librayzor_runtime.a
          retention-days: 1

  benchmark:
    name: Benchmark Suite
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Install Haxe 4 + HashLink + hxcpp ---
      - name: Install Haxe 4.3.6
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Install HashLink
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libturbojpeg-dev libvorbis-dev libopenal-dev libsdl2-dev libmbedtls-dev libuv1-dev
          git clone https://github.com/HaxeFoundation/hashlink.git /tmp/hashlink
          cd /tmp/hashlink
          make
          sudo make install
          sudo ldconfig

      - name: Install hxcpp
        run: |
          haxelib setup ~/haxelib
          haxelib install hxcpp --always

      - name: Install hxjava
        run: |
          haxelib install hxjava

      - name: Verify Haxe installation
        run: |
          haxe --version
          hl --version || true
          echo "hxcpp installed: $(haxelib path hxcpp 2>/dev/null | head -1)"
          echo "hxjava installed: $(haxelib path hxjava 2>/dev/null | head -1)"

      # --- Install LLVM 18 for Rayzor ---
      - name: Install LLVM 18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository -y "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-18 main"
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-dev libpolly-18-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Download precompiled bundles
        uses: actions/download-artifact@v4
        with:
          name: precompiled-bundles
          path: compiler/benchmarks/precompiled

      - name: Download rayzor binaries
        uses: actions/download-artifact@v4
        with:
          name: rayzor-binaries
          path: target/release

      - name: Fix binary permissions
        run: chmod +x target/release/rayzor

      - name: Build compiler for benchmark runner
        run: cargo build --release --package compiler --features all-backends

      - name: Run nbody benchmark
        run: cargo run --release --package compiler --features all-backends --example benchmark_runner -- nbody --json --disable-trace

      - name: Run fibonacci benchmark
        run: cargo run --release --package compiler --features all-backends --example benchmark_runner -- fibonacci --json --disable-trace

      - name: Run deltablue benchmark
        run: cargo run --release --package compiler --features all-backends --example benchmark_runner -- deltablue --json --disable-trace

      - name: Run mandelbrot benchmark
        run: cargo run --release --package compiler --features all-backends --example benchmark_runner -- mandelbrot --json --disable-trace

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: compiler/benchmarks/results/
          retention-days: 90

      - name: Upload benchmark charts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-charts
          path: compiler/benchmarks/charts/
          retention-days: 90
